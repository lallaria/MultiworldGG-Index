name: Manifest data issue
description: Wrong / missing data in a `worlds/<slug>.json` entry (game name, IGDB id, version, URL, etc.)
title: "[manifest] <slug>: <short description>"
labels: ["manifest"]
body:
  - type: input
    id: slug
    attributes:
      label: Slug
      description: Filename stem of the affected manifest under `worlds/`
      placeholder: "oot"
    validations:
      required: true
  - type: dropdown
    id: field
    attributes:
      label: Affected field
      options:
        - game (display name)
        - igdb_id
        - module_location
        - world_version
        - minimum_ap_version
        - authors
        - flags
        - other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What's wrong, and what should it be?
      placeholder: "Currently `igdb_id: 123`, should be `igdb_id: 456` (IGDB link: ...)"
    validations:
      required: true
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirm
      options:
        - label: I checked the live `worlds/<slug>.json` on main (not a stale fork or local copy)
          required: true
