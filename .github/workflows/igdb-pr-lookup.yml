name: IGDB PR-time lookup

# Triggered when the "Needs IGDB id" label is applied to a PR. Oliver decides
# whether a PR needs an IGDB id (igdb_id missing from the merged manifest) and
# applies the label at PR-open time; this workflow then searches IGDB and posts
# candidates as a sticky comment so the codeowner can pick the right id during
# review.
#
# This workflow does NOT write the manifest, does NOT remove the label, and
# does NOT gate Karen's APPROVE step in karen-pr-review.yml. Picking a
# candidate, editing worlds/<slug>.json, and removing the label are the
# codeowner's responsibility during review — the codeowner reviews anyway and
# the chance of a clean single-match auto-resolve is too low to design around.
#
# Per project_manifest_merge_semantics: igdb_id is one of two Index-controlled
# fields. The author's own archipelago.json may set igdb_id to opt out of the
# Index lookup (their value wins on the next Oliver-driven update).

on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write   # post / update the sticky comment

concurrency:
  group: igdb-pr-lookup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lookup:
    if: >-
      github.event.label.name == 'Needs IGDB id'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # IGDB_CLIENT_ID / IGDB_CLIENT_SECRET live in the `igdb_gather` environment.
    environment: igdb_gather

    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect changed manifests
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git diff --name-only "${BASE_SHA}...${HEAD_SHA}" \
            | grep -E '^worlds/[^/]+\.json$' > pr-targets.txt || true
          target_count=$(wc -l < pr-targets.txt | tr -d '[:space:]')
          echo "target_count=${target_count}" >> "$GITHUB_OUTPUT"
          echo "Changed worlds:"
          cat pr-targets.txt || true

      - name: Run IGDB lookup per slug
        id: lookup
        if: steps.detect.outputs.target_count != '0'
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p igdb-actions
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            slug="$(basename "$path" .json)"
            python scripts/igdb_pr_lookup.py \
              --slug "$slug" \
              --head "$path" \
              --output "igdb-actions/${slug}.md"
          done < pr-targets.txt

      - name: Build sticky PR comment
        if: steps.detect.outputs.target_count != '0'
        run: |
          set -euo pipefail
          {
            echo "<!-- igdb-pr-lookup -->"
            echo "## IGDB PR lookup"
            echo
            echo "Oliver flagged this PR as needing an IGDB id. Pick a candidate from the list below, edit \`worlds/<slug>.json\` to add \`\"igdb_id\": <number>\`, and remove the **Needs IGDB id** label when done. If no candidate fits, search [IGDB](https://www.igdb.com/search) directly."
            echo
            for f in igdb-actions/*.md; do
              [ -f "$f" ] || continue
              cat "$f"
              echo
            done
          } > igdb-comment.md

      - name: Post or update sticky PR comment
        if: steps.detect.outputs.target_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("<!-- igdb-pr-lookup -->")) | .id' \
            | head -n 1 || true)
          if [ -n "${existing}" ]; then
            jq -n --rawfile body igdb-comment.md '{body: $body}' | \
              gh api -X PATCH "repos/${REPO}/issues/comments/${existing}" --input - >/dev/null
          else
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body-file igdb-comment.md
          fi
