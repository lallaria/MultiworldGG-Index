name: IGDB PR-time lookup

# Triggered when Karen pushes an `igdb-pr-<number>` tag at the PR head SHA.
# Karen does this in karen-pr-review.yml when she sees the `Needs IGDB id`
# label (which Oliver applies at PR-open time when the merged manifest lacks
# igdb_id). The tag → environment plumbing exists because the `igdb_gather`
# environment's deployment-branch policy includes `igdb-*` tags but NOT
# arbitrary PR branches; running on the tagged ref is what unlocks the IGDB
# credentials.
#
# This workflow does NOT write the manifest, does NOT remove the label, and
# does NOT gate Karen's APPROVE step in karen-pr-review.yml. Picking a
# candidate, editing worlds/<apworld>.json, and removing the label are the
# codeowner's responsibility during review.

on:
  push:
    tags: ['igdb-pr-*']

permissions:
  contents: read         # checkout the tagged ref
  pull-requests: write   # post / update the sticky comment

concurrency:
  group: igdb-pr-lookup-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lookup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: igdb_gather

    steps:
      - name: Derive PR number from tag
        id: pr
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          number="${tag#igdb-pr-}"
          if ! [[ "${number}" =~ ^[0-9]+$ ]]; then
            echo "Tag ${tag} did not match igdb-pr-<number>; aborting."
            exit 1
          fi
          echo "number=${number}" >> "$GITHUB_OUTPUT"

      - name: Look up PR head + base
        id: prinfo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          json=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")
          base_sha=$(echo "${json}" | jq -r '.base.sha')
          head_sha=$(echo "${json}" | jq -r '.head.sha')
          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout the tagged ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect changed manifests
        id: detect
        env:
          BASE_SHA: ${{ steps.prinfo.outputs.base_sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git diff --name-only "${BASE_SHA}...${HEAD_SHA}" \
            | grep -E '^worlds/[^/]+\.json$' > pr-targets.txt || true
          target_count=$(wc -l < pr-targets.txt | tr -d '[:space:]')
          echo "target_count=${target_count}" >> "$GITHUB_OUTPUT"
          echo "Changed worlds:"
          cat pr-targets.txt || true

      - name: Run IGDB lookup per apworld
        if: steps.detect.outputs.target_count != '0'
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p igdb-actions
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            apworld="$(basename "$path" .json)"
            python scripts/igdb_pr_lookup.py \
              --apworld "$apworld" \
              --head "$path" \
              --output "igdb-actions/${apworld}.md"
          done < pr-targets.txt

      - name: Build sticky PR comment
        if: steps.detect.outputs.target_count != '0'
        run: |
          set -euo pipefail
          {
            echo "<!-- igdb-pr-lookup -->"
            echo "## IGDB PR lookup"
            echo
            echo "Karen flagged this PR as needing an IGDB id. Pick a candidate from the list below, edit \`worlds/<apworld>.json\` to add \`\"igdb_id\": <number>\`, and remove the **Needs IGDB id** label when done. If no candidate fits, search [IGDB](https://www.igdb.com/search) directly."
            echo
            for f in igdb-actions/*.md; do
              [ -f "$f" ] || continue
              cat "$f"
              echo
            done
          } > igdb-comment.md

      - name: Post or update sticky PR comment
        if: steps.detect.outputs.target_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("<!-- igdb-pr-lookup -->")) | .id' \
            | head -n 1 || true)
          if [ -n "${existing}" ]; then
            jq -n --rawfile body igdb-comment.md '{body: $body}' | \
              gh api -X PATCH "repos/${REPO}/issues/comments/${existing}" --input - >/dev/null
          else
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body-file igdb-comment.md
          fi
