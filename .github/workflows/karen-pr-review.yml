name: Karen's PR review

# Karen is the default reviewer (via CODEOWNERS) for worlds/*.json updates.
# This workflow runs Karen's 7 security checks on every PR change against `main`,
# posts a sticky PR comment summarising the results, and requests human review
# only when all checks are green.
#
# Triggers on changes to worlds/** or schema/**.
#
# Two execution modes:
#   - manifest-only: full 7-check suite against just the changed manifests.
#   - schema-changed: fast subset (schema + manifest_consistency only) against
#     ALL manifests, since schema semantics changed for everyone. Deep checks
#     (clone + bandit + pip_audit + size + AST) are skipped on this path —
#     running them across all 229 manifests would take ~30 min.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "worlds/**"
      - "schema/**"
      - "scripts/karen_review.py"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: karen-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Karen's deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema bandit pip-audit

      - name: Detect changed manifests
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # All files changed in this PR
          git diff --name-only "${BASE_SHA}...${HEAD_SHA}" > changed-files.txt

          grep -E '^worlds/[^/]+\.json$' changed-files.txt > karen-targets.txt || true
          schema_changed=$(grep -E '^schema/' changed-files.txt || true)

          target_count=$(wc -l < karen-targets.txt | tr -d '[:space:]')
          echo "target_count=${target_count}" >> "$GITHUB_OUTPUT"
          echo "Changed worlds:"
          cat karen-targets.txt || true

          if [ -n "${schema_changed}" ]; then
            echo "schema_changed=true" >> "$GITHUB_OUTPUT"
            echo "Schema changed -> will run fast checks against ALL manifests"
          else
            echo "schema_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Karen (full suite on changed manifests)
        id: karen
        if: steps.detect.outputs.target_count != '0'
        run: |
          set -euo pipefail
          # Build --changed args from karen-targets.txt
          args=()
          while IFS= read -r path; do
            [ -n "$path" ] && args+=("--changed" "$path")
          done < karen-targets.txt

          # Allow per-PR size cap override via 'karen/size-cap-mb:NNN' label.
          size_cap=250
          while IFS= read -r label; do
            case "$label" in
              karen/size-cap-mb:*)
                size_cap="${label#karen/size-cap-mb:}"
                ;;
            esac
          done < <(jq -r '.pull_request.labels[].name' < "$GITHUB_EVENT_PATH")
          echo "Using size cap: ${size_cap}MB"

          set +e
          python scripts/karen_review.py \
            "${args[@]}" \
            --schema schema/world_manifest.schema.json \
            --size-cap-mb "${size_cap}" \
            --output-comment karen-comment.md \
            --output-summary karen-summary.json
          karen_exit=$?
          set -e

          overall=$(jq -r .overall karen-summary.json)
          echo "overall=${overall}" >> "$GITHUB_OUTPUT"
          echo "exit=${karen_exit}" >> "$GITHUB_OUTPUT"

      - name: Run Karen (schema validation across ALL manifests)
        id: karen_schema_only
        if: steps.detect.outputs.schema_changed == 'true' && steps.detect.outputs.target_count == '0'
        run: |
          set -euo pipefail
          # Schema changed but no specific manifests touched: validate all 229
          # against the new schema using only the fast checks (no clone, no
          # bandit, no pip-audit). Typical runtime: under 10 seconds.
          args=()
          for path in worlds/*.json; do
            args+=("--changed" "$path")
          done

          set +e
          python scripts/karen_review.py \
            "${args[@]}" \
            --schema schema/world_manifest.schema.json \
            --check schema --check manifest_consistency \
            --output-comment karen-comment.md \
            --output-summary karen-summary.json
          karen_exit=$?
          set -e

          overall=$(jq -r .overall karen-summary.json)
          echo "overall=${overall}" >> "$GITHUB_OUTPUT"
          echo "exit=${karen_exit}" >> "$GITHUB_OUTPUT"

      - name: Skip-trivial comment
        if: steps.detect.outputs.target_count == '0' && steps.detect.outputs.schema_changed != 'true'
        run: |
          cat > karen-comment.md <<'EOF'
          <!-- karen-pr-review -->
          ## Karen's review

          No `worlds/*.json` files in scope for this PR.
          EOF

      # ──────────────────────────────────────────────────────────────────────
      # Fuzzer (TODO #2b)
      #
      # For each changed manifest whose `module_location` is a pip-installable
      # `git+https://...` URL (i.e. shaped by Oliver's PR-opening flow against
      # a wheel branch + tag), clone MultiworldGG core, pip-install the
      # proposed wheel, drop Eijebong/Archipelago-fuzzer's fuzz.py at the
      # checkout root, and run `python fuzz.py -r N -g <slug>` against the
      # proposed world. A non-zero exit fails the job, which gates the
      # "Karen approves" step below.
      #
      # Skipped when:
      #   - target_count is 0 (nothing to fuzz)
      #   - schema-only change path (no specific manifests)
      #   - module_location is a legacy `tree/...` URL (not pip-installable)
      #
      # The runs and per-game timeout cap are conservative; tune via the
      # `karen/fuzz-runs:N` and `karen/fuzz-timeout:N` PR labels if needed.
      # ──────────────────────────────────────────────────────────────────────
      - name: Fuzz proposed worlds
        id: fuzz
        if: steps.detect.outputs.target_count != '0'
        env:
          MWGG_CORE_REPO: ${{ vars.MWGG_CORE_REPO || 'MultiworldGG/MultiworldGG' }}
          MWGG_CORE_REF: ${{ vars.MWGG_CORE_REF || 'main' }}
          FUZZER_REPO: Eijebong/Archipelago-fuzzer
          FUZZER_REF: main
          # MWGG core transitively imports Kivy when fuzz.py loads worlds. Kivy's
          # built-in arg parser intercepts -r / -m and exits 2 with a usage dump
          # before the fuzzer's argparse ever runs. Disable it per the fuzzer
          # README: https://github.com/Eijebong/Archipelago-fuzzer#how-to-run-this
          KIVY_NO_ARGS: "1"
        run: |
          set -euo pipefail

          # Per-PR overrides via labels.
          fuzz_runs=25
          fuzz_timeout=30
          while IFS= read -r label; do
            case "$label" in
              karen/fuzz-runs:*)    fuzz_runs="${label#karen/fuzz-runs:}" ;;
              karen/fuzz-timeout:*) fuzz_timeout="${label#karen/fuzz-timeout:}" ;;
            esac
          done < <(jq -r '.pull_request.labels[].name' < "$GITHUB_EVENT_PATH")
          echo "Fuzz config: runs=${fuzz_runs} per-gen-timeout=${fuzz_timeout}s"

          mkdir -p fuzz_output_all
          fuzz_overall=pass
          fuzz_summary=""

          while IFS= read -r manifest_path; do
            [ -z "$manifest_path" ] && continue
            slug="$(basename "$manifest_path" .json)"
            module_location="$(jq -r '.module_location // ""' "${GITHUB_WORKSPACE}/${manifest_path}")"

            if ! echo "$module_location" | grep -qE '^git\+https://'; then
              echo "::notice::Skipping fuzz for ${slug}: module_location is not a pip-installable git+https URL (got: ${module_location:0:60}...)"
              fuzz_summary+="- ${slug}: skipped (legacy module_location)\n"
              continue
            fi

            echo "::group::Fuzz ${slug}"
            workdir="$(mktemp -d)"
            (
              cd "$workdir"
              git clone --depth 1 --branch "${MWGG_CORE_REF}" "https://github.com/${MWGG_CORE_REPO}.git" core
              cd core
              python -m venv .venv
              # shellcheck disable=SC1091
              source .venv/bin/activate
              python -m pip install --upgrade pip
              # MultiworldGG core install — best-effort. If the repo doesn't ship a
              # canonical extra, fall back to its requirements file.
              if [ -f setup.py ] || [ -f pyproject.toml ]; then
                python -m pip install -e . || python -m pip install -r requirements.txt
              else
                python -m pip install -r requirements.txt
              fi
              # Pip-install the proposed apworld wheel (the actual world under review).
              python -m pip install "${module_location}"

              # Drop fuzz.py from Eijebong/Archipelago-fuzzer at the core repo root.
              curl -sSfL \
                "https://raw.githubusercontent.com/${FUZZER_REPO}/${FUZZER_REF}/fuzz.py" \
                -o fuzz.py

              set +e
              timeout 15m python fuzz.py -r "${fuzz_runs}" -t "${fuzz_timeout}" -g "${slug}" -j 2
              fuzz_exit=$?
              set -e

              # Capture artifacts regardless of outcome.
              if [ -d fuzz_output ]; then
                mkdir -p "$GITHUB_WORKSPACE/fuzz_output_all/${slug}"
                cp -r fuzz_output/. "$GITHUB_WORKSPACE/fuzz_output_all/${slug}/" 2>/dev/null || true
              fi

              exit ${fuzz_exit}
            )
            world_exit=$?
            echo "::endgroup::"

            if [ "${world_exit}" -ne 0 ]; then
              fuzz_overall=fail
              fuzz_summary+="- ${slug}: ❌ fuzz failed (exit=${world_exit})\n"
            else
              fuzz_summary+="- ${slug}: ✅ fuzz passed\n"
            fi
          done < karen-targets.txt

          echo "fuzz_overall=${fuzz_overall}" >> "$GITHUB_OUTPUT"
          {
            echo "fuzz_summary<<EOF"
            printf '%b' "${fuzz_summary}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload fuzzer artifacts
        if: always() && steps.fuzz.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: karen-fuzz-output
          path: fuzz_output_all/
          if-no-files-found: ignore

      - name: Upload Karen artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karen-review
          path: |
            karen-comment.md
            karen-summary.json
          if-no-files-found: warn

      - name: Post or update sticky PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ ! -f karen-comment.md ]; then
            echo "no comment to post"
            exit 0
          fi
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("<!-- karen-pr-review -->")) | .id' \
            | head -n 1 || true)
          if [ -n "${existing}" ]; then
            echo "updating comment ${existing}"
            # `gh api -f body=@file` does NOT expand @ to file contents — it
            # treats the value as the literal string. Build a JSON body with
            # jq's --rawfile and pipe it via --input -.
            jq -n --rawfile body karen-comment.md '{body: $body}' | \
              gh api -X PATCH "repos/${REPO}/issues/comments/${existing}" --input - >/dev/null
          else
            echo "creating new comment"
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body-file karen-comment.md
          fi

      - name: Request human review on green
        if: steps.karen.outputs.overall == 'pass' || steps.karen_schema_only.outputs.overall == 'pass'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REVIEWERS: ${{ vars.KAREN_HUMAN_REVIEWERS }}
        run: |
          set -euo pipefail
          if [ -z "${REVIEWERS:-}" ]; then
            echo "KAREN_HUMAN_REVIEWERS variable is unset; skipping review request."
            exit 0
          fi
          # vars.KAREN_HUMAN_REVIEWERS is a comma-separated list, e.g.
          # "user1,team:org/maintainers,user2"
          users=()
          teams=()
          IFS=',' read -ra ENTRIES <<< "${REVIEWERS}"
          for entry in "${ENTRIES[@]}"; do
            entry="${entry//[[:space:]]/}"
            [ -z "${entry}" ] && continue
            case "${entry}" in
              team:*)
                teams+=("${entry#team:}")
                ;;
              *)
                users+=("${entry}")
                ;;
            esac
          done
          args=()
          if [ "${#users[@]}" -gt 0 ]; then
            args+=("--add-reviewer" "$(IFS=,; echo "${users[*]}")")
          fi
          if [ "${#teams[@]}" -gt 0 ]; then
            args+=("--add-reviewer" "$(IFS=,; echo "${teams[*]}")")
          fi
          gh pr edit "${PR_NUMBER}" --repo "${REPO}" "${args[@]}" || {
            echo "review request failed (often: reviewer already requested or insufficient perms); not blocking."
          }

      - name: Fail the check on red
        if: |
          (steps.karen.outputs.exit != '' && steps.karen.outputs.exit != '0') ||
          (steps.karen_schema_only.outputs.exit != '' && steps.karen_schema_only.outputs.exit != '0') ||
          (steps.fuzz.outputs.fuzz_overall == 'fail')
        run: |
          echo "Karen reported red checks (or fuzz failed); failing the workflow."
          exit 1

      # ──────────────────────────────────────────────────────────────────────
      # Karen as approver (TODO #2a)
      #
      # Karen mints an installation token using her own GitHub App credentials
      # and submits an approving review. Reviews submitted by an App count
      # toward branch-protection's "Required approvals" gate as long as the
      # App is not the same identity that opened the PR (Oliver opens PRs;
      # Karen approves them — different Apps).
      #
      # Operator setup:
      #   - vars.KAREN_APP_ID    — Karen's numeric App ID (not secret)
      #   - secrets.KAREN_PRIVATE_KEY — full PEM of Karen's private key
      # Without these set, this step is a no-op so the existing
      # human-review-request flow still works.
      #
      # APPROVE happens only on full green:
      #   - karen review passed (or schema-only path passed)
      #   - fuzz passed or was skipped (not applicable)
      # Otherwise (any check red), submit REQUEST_CHANGES so re-pushes can
      # cleanly dismiss the rejection on the next run.
      # ──────────────────────────────────────────────────────────────────────
      - name: Mint Karen's installation token
        id: karen_token
        if: vars.KAREN_APP_ID != '' && always()
        uses: actions/create-github-app-token@v1
        continue-on-error: true
        with:
          app-id: ${{ vars.KAREN_APP_ID }}
          private-key: ${{ secrets.KAREN_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Karen submits APPROVE on green
        if: |
          steps.karen_token.outputs.token != '' &&
          steps.fuzz.outputs.fuzz_overall != 'fail' &&
          (steps.karen.outputs.overall == 'pass' || steps.karen_schema_only.outputs.overall == 'pass')
        env:
          GH_TOKEN: ${{ steps.karen_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            -f event=APPROVE \
            -f body="Karen review checks passed (manifest schema, consistency, fuzz)."

      - name: Karen submits REQUEST_CHANGES on red
        if: |
          steps.karen_token.outputs.token != '' &&
          (
            (steps.karen.outputs.exit != '' && steps.karen.outputs.exit != '0') ||
            (steps.karen_schema_only.outputs.exit != '' && steps.karen_schema_only.outputs.exit != '0') ||
            steps.fuzz.outputs.fuzz_overall == 'fail'
          )
        env:
          GH_TOKEN: ${{ steps.karen_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Compose a short body; the sticky comment already has details.
          body="Karen review checks failed. See the karen-pr-review comment for the breakdown."
          gh api -X POST "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            -f event=REQUEST_CHANGES \
            -f body="${body}" || {
              echo "REQUEST_CHANGES POST failed (may be unsupported on draft PRs); not blocking."
            }
