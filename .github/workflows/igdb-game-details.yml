name: IGDB game details on merge

# Runs after a PR merges to main. For each `worlds/<apworld>.json` that the merge
# commit added or modified, hits IGDB for current metadata and updates the
# apworld's row in `output/igdb_game details.json`. Commits the diff back to main
# with `[skip ci]` so the daily-release / Karen workflows don't re-trigger.
#
# Manual run: workflow_dispatch with optional --apworld input.

on:
  push:
    branches: [main]
    paths:
      - "worlds/**.json"
  workflow_dispatch:
    inputs:
      apworld:
        description: "Single apworld to get game details for (e.g. 'oot'). Leave blank to get game details for every changed apworld, or set --all below."
        required: false
        type: string
      all:
        description: "Get game details for every apworld (slow; hits IGDB rate limits)."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  # Serialise game details runs against main — prevents two pushes racing on the
  # same igdb_game_details.json commit.
  group: igdb-game-details-main
  cancel-in-progress: false

jobs:
  game-details:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Pulls IGDB_CLIENT_ID / IGDB_CLIENT_SECRET from the `igdb_env`
    # environment, which is restricted to the `main` branch. PR runs and
    # feature-branch dispatches cannot reach the secrets.
    environment: igdb_env

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit to diff against

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect target apworlds
        id: detect
        env:
          DISPATCH_APWORLD: ${{ inputs.apworld }}
          DISPATCH_ALL: ${{ inputs.all }}
        run: |
          set -euo pipefail
          mode=""
          apworlds=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${DISPATCH_ALL}" = "true" ]; then
              mode="all"
            elif [ -n "${DISPATCH_APWORLD:-}" ]; then
              mode="explicit"
              apworlds="${DISPATCH_APWORLD}"
            else
              mode="none"
            fi
          else
            # push event: diff the commit's worlds/*.json changes
            mode="diff"
            apworlds=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" \
                      | grep -E '^worlds/[^/]+\.json$' \
                      | sed -E 's|^worlds/(.+)\.json$|\1|' || true)
          fi

          echo "mode=${mode}" >> "$GITHUB_OUTPUT"
          {
            echo "apworlds<<EOF"
            echo "${apworlds}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Detected mode: ${mode}"
          echo "APWorlds:"
          echo "${apworlds}" | sed 's/^/  /'

      - name: Run IGDB game details
        id: game-details
        if: steps.detect.outputs.mode != 'none' && (steps.detect.outputs.mode == 'all' || steps.detect.outputs.apworlds != '')
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${IGDB_CLIENT_ID:-}" ] || [ -z "${IGDB_CLIENT_SECRET:-}" ]; then
            echo "::error::IGDB_CLIENT_ID / IGDB_CLIENT_SECRET secrets are not set."
            exit 1
          fi

          args=()
          if [ "${{ steps.detect.outputs.mode }}" = "all" ]; then
            args+=("--all")
          else
            while IFS= read -r apworld; do
              [ -n "$apworld" ] && args+=("--apworld" "$apworld")
            done <<< "${{ steps.detect.outputs.apworlds }}"
          fi

          python scripts/igdb_game_details.py "${args[@]}" \
            --game details-path output/igdb_game details.json \
            --worlds-dir worlds

      - name: Commit game details back to main
        if: steps.detect.outputs.mode != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet output/igdb_game details.json; then
            echo "no changes to igdb_game details.json"
            exit 0
          fi

          git add output/igdb_game details.json
          git commit -m "chore(igdb): refresh game details [skip ci]" \
                     -m "Triggered by ${{ github.event_name }} on ${{ github.sha }}."
          git push origin HEAD:main
